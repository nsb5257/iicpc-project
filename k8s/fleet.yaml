apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-deployment
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: fleet
  template:
    metadata:
      labels:
        app: fleet
    spec:
      containers:
      - name: fleet
        image: us-central1-docker.pkg.dev/active-freehold-499017-q0/iicpc-repo/iicpc-platform:latest
        imagePullPolicy: IfNotPresent
        command: ["./fleet-binary"] 
        ports:
        - containerPort: 8080
        - containerPort: 8084
        env:
        - name: REDPANDA_HOST
          value: "redpanda-service:9092"
        resources:
          requests:
            cpu: "1000m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: fleet-service
spec:
  selector:
    app: fleet
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
  - name: health
    protocol: TCP
    port: 8084
    targetPort: 8084
  type: LoadBalancer # Upgraded to LoadBalancer so Load Test script can trigger tests
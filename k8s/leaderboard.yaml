apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-deployment
spec:
  replicas: 3 # Scaled up for thousands of judges
  selector:
    matchLabels:
      app: leaderboard
  template:
    metadata:
      labels:
        app: leaderboard
    spec:
      containers:
      - name: leaderboard
        image: us-central1-docker.pkg.dev/active-freehold-499017-q0/iicpc-repo/iicpc-platform:latest
        imagePullPolicy: Always
        command:
          - ./leaderboard-binary
        ports:
        - containerPort: 8085
        env:
        - name: DB_HOST
          value: "timescaledb-service"
        - name: REDIS_HOST
          value: "redis-service:6379"
        # Securely unlock the database password
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: iicpc-secrets
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: iicpc-secrets
              key: db-password
        # Set a strict resource budget
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "2000m"
            memory: "512Mi"
        # Health checks so K8s knows when to restart a crashed server
        livenessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-service
spec:
  type: LoadBalancer # This tells Google Cloud to create a public IP address!
  selector:
    app: leaderboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8085
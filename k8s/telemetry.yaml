apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry
  template:
    metadata:
      labels:
        app: telemetry
    spec:
      containers:
      - name: telemetry
        image: us-central1-docker.pkg.dev/active-freehold-499017-q0/iicpc-repo/iicpc-platform:latest
        imagePullPolicy: IfNotPresent
        command: ["./telemetry-binary"]
        ports:
        - containerPort: 8083
        env:
        - name: DB_HOST
          value: "timescaledb-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "iicpc_admin"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: iicpc-secrets
              key: db-password
        - name: DB_NAME
          value: "metrics_db"
        - name: REDPANDA_HOST
          value: "redpanda-service:9092"
        resources:
          requests:
            cpu: "1000m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 5
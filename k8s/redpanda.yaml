apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: docker.redpanda.com/redpandadata/redpanda:latest
        args:
          - start
          - --overprovisioned
          - --smp
          - "1"
          - --memory
          - 1G
          - --reserve-memory
          - 0M
          - --node-id
          - "0"
          # CRITICAL KAFKA NETWORKING FIX:
          - --kafka-addr
          - PLAINTEXT://0.0.0.0:9092
          - --advertise-kafka-addr
          - PLAINTEXT://redpanda-service:9092
        ports:
          - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-service
spec:
  selector:
    app: redpanda
  ports:
    - protocol: TCP
      port: 9092
      targetPort: 9092
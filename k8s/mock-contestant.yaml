# k8s/mock-contestant.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-contestant-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-contestant
  template:
    metadata:
      labels:
        app: mock-contestant
    spec:
      containers:
      - name: mock-contestant
        image: iicpc-platform:latest
        imagePullPolicy: IfNotPresent
        command: ["./mock-contestant-binary"]
        ports:
        - containerPort: 8080
        # Standard health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
---
# The Service name must EXACTLY match what the Bot Fleet is looking for
apiVersion: v1
kind: Service
metadata:
  name: mock-contestant-service
spec:
  selector:
    app: mock-contestant
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
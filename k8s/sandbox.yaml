apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      containers:
      # 1. Your Sandbox Application
      - name: sandbox
        image: us-central1-docker.pkg.dev/active-freehold-499017-q0/iicpc-repo/iicpc-platform:latest
        imagePullPolicy: IfNotPresent
        command: ["./sandbox-binary"]
        ports:
        - containerPort: 8081  
        - containerPort: 50051 
        env:
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        # Crucial: Tell the Go client to talk to the sidecar instead of a socket
        - name: DOCKER_HOST
          value: "tcp://localhost:2375"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5

      # 2. The Docker-in-Docker Sidecar
      - name: dind
        image: docker:24.0-dind
        env:
        - name: DOCKER_TLS_CERTDIR
          value: "" # Disable TLS so localhost communication works seamlessly
        securityContext:
          privileged: true # Required to run nested containers
        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "2Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-service
spec:
  selector:
    app: sandbox
  ports:
  - name: grpc
    protocol: TCP
    port: 50051
    targetPort: 50051
  - name: http
    protocol: TCP
    port: 8081
    targetPort: 8081
  type: LoadBalancer
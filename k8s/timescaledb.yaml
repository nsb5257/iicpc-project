# 1. The Persistent Volume Claim: Ensures data survives pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# 2. The Deployment: Manages the actual Database Container
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb-deployment
spec:
  replicas: 1 # Strictly 1 to avoid data/write conflicts
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
      - name: timescaledb
        image: timescale/timescaledb:latest-pg15
        ports:
        - containerPort: 5432
        env:
        # Securely fetch credentials from our K8s Secret Vault
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: iicpc-secrets
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: iicpc-secrets
              key: db-password
        # DB Name is not a secret, safe to declare here
        - name: POSTGRES_DB
          value: "metrics_db"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        # Mount the persistent storage inside the container
        volumeMounts:
        - name: timescaledb-storage
          mountPath: /var/lib/postgresql/data
      # Define the volume backed by our PVC
      volumes:
      - name: timescaledb-storage
        persistentVolumeClaim:
          claimName: timescaledb-pvc

---
# 3. The Service: The Internal Phonebook / DNS
apiVersion: v1
kind: Service
metadata:
  name: timescaledb-service
spec:
  selector:
    app: timescaledb
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
# 1. The Deployment: Manages the actual Database Container
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb-deployment
spec:
  replicas: 1 # We only want 1 database running to avoid data conflicts
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
      - name: timescaledb
        image: timescale/timescaledb:latest-pg15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "iicpc_admin"
        - name: POSTGRES_PASSWORD
          value: "supersecretpassword"
        - name: POSTGRES_DB
          value: "metrics_db"

---
# 2. The Service: The Internal Phonebook / DNS
apiVersion: v1
kind: Service
metadata:
  name: timescaledb-service
spec:
  selector:
    app: timescaledb
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
version: '3.8'

services:
  redpanda:
    image: docker.vectorized.io/vectorized/redpanda:latest
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:9093
    ports:
      - "9092:9092"
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_USER: iicpc_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecretpassword}
      POSTGRES_DB: metrics_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iicpc_admin -d metrics_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sandbox:
    build: 
      context: .
    # Note: Depending on your Dockerfile structure, you might use a prebuilt image instead.
    # We use go run here for rapid local development execution without rebuilding images constantly.
    command: ["go", "run", "./cmd/sandbox"]
    ports:
      - "8081:8081"
      - "50051:50051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    depends_on:
      - redpanda
      - timescaledb
      - redis

  fleet:
    build:
      context: .
    command: ["go", "run", "./cmd/fleet"]
    ports:
      - "8080:8080"
    environment:
      - REDPANDA_HOST=redpanda:9092
    depends_on:
      - sandbox

  telemetry:
    build:
      context: .
    command: ["go", "run", "./cmd/telemetry"]
    environment:
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=iicpc_admin
      - DB_PASSWORD=${DB_PASSWORD:-supersecretpassword}
      - DB_NAME=metrics_db
      - REDPANDA_HOST=redpanda:9092
    depends_on:
      timescaledb:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  leaderboard:
    build:
      context: .
    command: ["go", "run", "./cmd/leaderboard"]
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=iicpc_admin
      - DB_PASSWORD=${DB_PASSWORD:-supersecretpassword}
      - DB_NAME=metrics_db
      - REDIS_HOST=redis:6379
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
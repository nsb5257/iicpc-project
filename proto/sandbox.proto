syntax = "proto3";

package sandbox;

option go_package = "iicpc-platform/pb";

service SandboxService {
  rpc ExecuteSubmission (ExecuteRequest) returns (ExecuteResponse) {}
}

message ExecuteRequest {
  string submission_id = 1;
  string source_file_path = 2;
  string language = 3;
}

message ExecuteResponse {
  bool success = 1;
  string message = 2;
  string container_ip = 3;
  int32 container_port = 4;
}
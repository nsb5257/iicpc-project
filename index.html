<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IICPC Leaderboard 2026</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1e1e2f; 
            color: #fff; 
            padding: 40px; 
            margin: 0;
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
        }
        h1 { 
            margin: 0; 
            color: #00d2ff; 
        }
        .status { 
            font-weight: bold; 
            color: #f39c12; 
            padding: 8px 12px;
            border-radius: 4px;
            background: rgba(0,0,0,0.2);
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background-color: #2a2a40; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        th, td { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 1px solid #3a3a50; 
        }
        th { 
            background-color: #33334d; 
            color: #aaa; 
            text-transform: uppercase; 
            font-size: 14px; 
            letter-spacing: 0.5px;
        }
        tr:hover {
            background-color: #31314d;
        }
        .score { 
            font-weight: bold; 
            color: #2ecc71; 
            font-size: 18px; 
        }
        .rank {
            font-weight: bold;
            color: #888;
            width: 40px;
        }
        .rank-1 { color: #f1c40f; font-size: 1.1em; } /* Gold */
        .rank-2 { color: #bdc3c7; font-size: 1.05em; } /* Silver */
        .rank-3 { color: #cd7f32; font-size: 1.05em; } /* Bronze */
    </style>
</head>
<body>

    <div class="header">
        <h1>IICPC Live Leaderboard</h1>
        <div class="status" id="connection-status">Connecting to Telemetry...</div>
    </div>

    <table>
        <thead>
            <tr>
                <th class="rank">#</th>
                <th>Submission ID</th>
                <th>Throughput (TPS)</th>
                <th>P50 Latency (ms)</th>
                <th>P90 Latency (ms)</th>
                <th>P99 Latency (ms)</th>
                <th>Composite Score</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            <tr>
                <td colspan="7" style="text-align: center; color: #777; padding: 30px;">Waiting for first telemetry tick...</td>
            </tr>
        </tbody>
    </table>

    <script>
        const statusEl = document.getElementById('connection-status');
        const tbody = document.getElementById('leaderboard-body');

        // Establish the WebSocket connection
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;
        
        let ws;

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusEl.textContent = '🟢 LIVE (WebSocket Connected)';
                statusEl.style.color = '#2ecc71';
            };

            ws.onmessage = (event) => {
                const dataArray = JSON.parse(event.data);
                
                if (!Array.isArray(dataArray) || dataArray.length === 0) {
                    return;
                }

                // Clear the table body
                tbody.innerHTML = '';

                // Iterate over the ranked array and build rows
                dataArray.forEach((contestant, index) => {
                    const rank = index + 1;
                    let rankClass = '';
                    if (rank === 1) rankClass = 'rank-1';
                    else if (rank === 2) rankClass = 'rank-2';
                    else if (rank === 3) rankClass = 'rank-3';

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="rank ${rankClass}">${rank}</td>
                        <td><strong>${contestant.submission_id}</strong></td>
                        <td>${contestant.tps.toFixed(2)}</td>
                        <td>${contestant.p50_latency_ms.toFixed(2)}</td>
                        <td>${contestant.p90_latency_ms.toFixed(2)}</td>
                        <td>${contestant.p99_latency_ms.toFixed(2)}</td>
                        <td class="score">${contestant.composite_score.toFixed(2)}</td>
                    `;
                    tbody.appendChild(row);
                });
            };

            ws.onclose = () => {
                statusEl.textContent = '🔴 DISCONNECTED. Reconnecting...';
                statusEl.style.color = '#e74c3c';
                // Attempt to reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket encountered error: ', err, 'Closing socket');
                ws.close();
            };
        }

        // Initialize connection
        connectWebSocket();
    </script>
</body>
</html>
